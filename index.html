<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المؤقت الخاص بي</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>المؤقت</h1>

    <div class="timer">
      <span id="minutes">05</span> :
      <span id="seconds">00</span>
    </div>

    <button onclick="startTimer()">ابدأ</button>
    <button onclick="resetTimer()">إعادة</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
